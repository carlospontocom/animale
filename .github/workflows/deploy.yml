name: Deploy para o Firebase Hosting

on:
  push:
    branches:
      - main # Dispara o robô toda vez que você der 'git push origin main'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Versão compatível com o seu Vite/Vue
          cache: 'yarn'

      - name: Instalar dependências e fazer o Build
        run: |
          yarn install
          yarn build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy para o Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_TOKEN }}' # Passa o token no parâmetro obrigatório
          projectId: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          channelId: live # Envia direto para a versão oficial do site
